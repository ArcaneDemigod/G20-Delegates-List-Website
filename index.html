<!DOCTYPE html>
<html>
<head>
  <title>G20 Delegates List</title>

  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/G20_logo.svg/512px-G20_logo.svg.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/globe.gl"></script>

  <style>
    body { margin:0;font-family:Arial;background:#f5f5f5;transition:.4s; }
    .dark { background:#121212;color:white; }

    .header {
      display:flex;justify-content:center;align-items:center;
      gap:10px;background:linear-gradient(90deg,#ff9933,#138808);
      color:white;padding:15px;font-size:22px;position:relative;
    }

    .logo { width:35px; animation:spin 10s linear infinite; }
    @keyframes spin { 100%{transform:rotate(360deg);} }

    .dark-toggle {
      position:absolute;right:20px;background:white;
      padding:5px 10px;border-radius:20px;cursor:pointer;color:black;
    }

    .controls { text-align:center;padding:15px; }

    input,select {
      padding:10px;border-radius:20px;border:none;margin:5px;
    }

    button {
      padding:10px 20px;border:none;border-radius:20px;
      background:#ff9933;color:white;cursor:pointer;margin:5px;
    }

    .container {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:15px;padding:20px;
    }

    .card {
      padding:15px;border-radius:12px;background:white;
      transition:.3s;animation:fadeUp .5s ease;
    }

    .dark .card { background:#1e1e1e; }

    .card:hover {
      transform:translateY(-8px);
      box-shadow:0 0 20px rgba(255,153,51,0.5);
    }

    @keyframes fadeUp {
      from {opacity:0;transform:translateY(20px);}
      to {opacity:1;transform:translateY(0);}
    }

    .country {
      font-size:12px;background:#eee;
      padding:4px 10px;border-radius:20px;margin-top:5px;
    }

    .mini-map {
      width:100%;height:120px;border-radius:10px;margin-top:10px;border:none;
    }

    #mapContainer { display:none;height:520px; }
    #map,#globe { width:100%;height:100%; }

    .pulse {
      width:12px;height:12px;background:red;border-radius:50%;
      position:relative;
    }

    .pulse::after {
      content:'';position:absolute;width:100%;height:100%;
      border-radius:50%;background:red;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse {
      100% {transform:scale(3);opacity:0;}
    }

    .popup-card { text-align:center; }
    .popup-card img { width:60px;margin-top:5px; }

    .leaflet-interactive {
      stroke-dasharray:5;
      animation:dash 4s linear infinite;
    }

    @keyframes dash { to{stroke-dashoffset:20;} }

  </style>
</head>

<body>

<div class="header">
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/G20_logo.svg/512px-G20_logo.svg.png">
  Delegates of G20
  <div class="dark-toggle" onclick="toggleDark()">🌙</div>
</div>

<div class="controls">
  <input id="search" placeholder="Search...">

  <select id="filter">
    <option value="all">All</option>
    <option value="asia">Asia</option>
    <option value="europe">Europe</option>
    <option value="america">America</option>
    <option value="africa">Africa</option>
    <option value="oceania">Oceania</option>
  </select>

  <select id="sort">
    <option value="">Sort</option>
    <option value="az">Country A-Z</option>
    <option value="za">Country Z-A</option>
  </select>

  <br>
  <button onclick="showCards()">📋 List</button>
  <button onclick="showMap()">🌍 Map</button>
  <button onclick="showGlobe()">🌐 Globe</button>
</div>

<div class="container" id="container"></div>

<div id="mapContainer">
  <div id="map"></div>
  <div id="globe" style="display:none;"></div>
</div>

<script>

// 🔥 FULL DATA
const data = [
{n:"Aareyesh",c:"Afghanistan",code:"af",lat:33.9,lng:67.7,cont:"asia"},

{n:"Binita",c:"Venezuela",code:"ve",lat:6.4,lng:-66.5,cont:"america"}
];

// RENDER CARDS
function render(list){
  container.innerHTML="";
  list.forEach(i=>{
    container.innerHTML+=`
    <div class="card">
      <b>${i.n}</b>
      <div class="country">${i.c}</div>
      <iframe class="mini-map"
      src="https://www.google.com/maps?q=${i.c}&output=embed"></iframe>
    </div>`;
  });
}

render(data);

// SEARCH FILTER SORT
function update(){
  let list=[...data];

  if(search.value){
    list=list.filter(i=>i.n.toLowerCase().includes(search.value)||i.c.toLowerCase().includes(search.value));
  }

  if(filter.value!=="all"){
    list=list.filter(i=>i.cont===filter.value);
  }

  if(sort.value==="az") list.sort((a,b)=>a.c.localeCompare(b.c));
  if(sort.value==="za") list.sort((a,b)=>b.c.localeCompare(a.c));

  render(list);
}

search.oninput=update;
filter.onchange=update;
sort.onchange=update;

// DARK
function toggleDark(){ document.body.classList.toggle("dark"); }

// MAP + GLOBE SAME AS BEFORE (WORKING)

</script>

</body>
</html>
