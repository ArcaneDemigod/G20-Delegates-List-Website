<!DOCTYPE html>
<html>
<head>
  <title>G20 Delegates List</title>

  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/G20_logo.svg/512px-G20_logo.svg.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/globe.gl"></script>

  <style>
    body { margin:0;font-family:Arial;background:#f5f5f5;transition:.3s; }
    .dark { background:#121212;color:white; }

    .header {
      display:flex;justify-content:center;align-items:center;
      gap:10px;background:linear-gradient(90deg,#ff9933,#138808);
      color:white;padding:15px;font-size:22px;position:relative;
    }

    .logo { width:35px; }
    .dark-toggle {
      position:absolute;right:20px;background:white;
      padding:5px 10px;border-radius:20px;cursor:pointer;color:black;
    }

    .controls { text-align:center;padding:15px; }

    input,select {
      padding:10px;border-radius:20px;border:none;margin:5px;
    }

    button {
      padding:10px 20px;border:none;border-radius:20px;
      background:#ff9933;color:white;cursor:pointer;margin:5px;
    }

    .container {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:15px;padding:20px;
    }

    .card {
      padding:15px;border-radius:12px;background:white;
      position:relative;
      transition:.3s;
    }

    .dark .card { background:#1e1e1e; }

    .card:hover {
      transform:translateY(-5px);
      box-shadow:0 0 20px rgba(255,153,51,0.5);
    }

    .country {
      font-size:12px;background:#eee;
      padding:4px 10px;border-radius:20px;margin-top:5px;
    }

    .flag { width:40px;margin-top:5px; }

    /* HOVER MAP */
    .mini-map-popup {
      position:absolute;
      bottom:110%;
      left:50%;
      transform:translateX(-50%);
      width:220px;height:150px;
      background:white;
      border-radius:10px;
      overflow:hidden;
      opacity:0;
      transition:.3s;
      pointer-events:none;
    }

    .card:hover .mini-map-popup { opacity:1; }

    .mini-map-popup iframe {
      width:100%;height:100%;border:none;
    }

    #mapContainer { display:none;height:520px; }
    #map,#globe { width:100%;height:100%; }

    .pulse {
      width:12px;height:12px;background:red;border-radius:50%;
      position:relative;
    }

    .pulse::after {
      content:'';position:absolute;width:100%;height:100%;
      border-radius:50%;background:red;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse {
      100% { transform:scale(3);opacity:0; }
    }

    .popup-card { text-align:center; }
    .popup-card img { width:60px; }

  </style>
</head>

<body>

<div class="header">
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/G20_logo.svg/512px-G20_logo.svg.png">
  Delegates of G20
  <div class="dark-toggle" onclick="toggleDark()">🌙</div>
</div>

<div class="controls">
  <input id="search" placeholder="Search...">

  <button onclick="showCards()">📋 List</button>
  <button onclick="showMap()">🌍 Map</button>
  <button onclick="showGlobe()">🌐 Globe</button>
</div>

<div class="container" id="container"></div>

<div id="mapContainer">
  <div id="map"></div>
  <div id="globe" style="display:none;"></div>
</div>

<script>

const data = [
{n:"Aareyesh",c:"Afghanistan",code:"af",lat:33.9,lng:67.7,cont:"asia"},
{n:"Deekshith",c:"Argentina",code:"ar",lat:-38.4,lng:-63.6,cont:"america"},
{n:"Soumil",c:"Australia",code:"au",lat:-25.2,lng:133.7,cont:"oceania"},
{n:"Vamshi",c:"Bangladesh",code:"bd",lat:23.6,lng:90.3,cont:"asia"},
{n:"Niharika",c:"Brazil",code:"br",lat:-14.2,lng:-51.9,cont:"america"},
{n:"Srivalli",c:"Canada",code:"ca",lat:56.1,lng:-106.3,cont:"america"},
{n:"Narthana",c:"China",code:"cn",lat:35.8,lng:104.1,cont:"asia"},
{n:"Chetan",c:"Democratic Republic of the Congo",code:"cd",lat:-4,lng:21,cont:"africa"},
{n:"Pathan",c:"Denmark",code:"dk",lat:56.2,lng:9.5,cont:"europe"},
{n:"Adwaith",c:"European Union",code:"eu",lat:50.8,lng:4.3,cont:"europe"},
{n:"Daniel",c:"France",code:"fr",lat:46.2,lng:2.2,cont:"europe"},
{n:"Aaskshar",c:"Germany",code:"de",lat:51.1,lng:10.4,cont:"europe"},
{n:"Ashwath",c:"India",code:"in",lat:20.5,lng:78.9,cont:"asia"},
{n:"Kshethrith",c:"Indonesia",code:"id",lat:-0.7,lng:113.9,cont:"asia"},
{n:"Siri",c:"Iran",code:"ir",lat:32.4,lng:53.6,cont:"asia"},
{n:"Rithvik",c:"Israel",code:"il",lat:31,lng:34.8,cont:"asia"},
{n:"Varnith",c:"Italy",code:"it",lat:41.8,lng:12.5,cont:"europe"},
{n:"Rakshith",c:"Japan",code:"jp",lat:36.2,lng:138.2,cont:"asia"},
{n:"Dhruvi",c:"Mexico",code:"mx",lat:23.6,lng:-102.5,cont:"america"},
{n:"Zenith",c:"New Zealand",code:"nz",lat:-40.9,lng:174.8,cont:"oceania"},
{n:"Hamsa Nandini",c:"North Korea",code:"kp",lat:40.3,lng:127.5,cont:"asia"},
{n:"Aakshaya",c:"Palestine",code:"ps",lat:31.9,lng:35.2,cont:"asia"},
{n:"Vishwan",c:"Saudi Arabia",code:"sa",lat:23.8,lng:45,cont:"asia"},
{n:"Aashi",c:"South Korea",code:"kr",lat:35.9,lng:127.7,cont:"asia"},
{n:"Anshu",c:"South Africa",code:"za",lat:-30.5,lng:22.9,cont:"africa"},
{n:"Daksh",c:"Syria",code:"sy",lat:34.8,lng:38.9,cont:"asia"},
{n:"Jai Chandra",c:"Turkey",code:"tr",lat:38.9,lng:35.2,cont:"europe"},
{n:"Krishna Reddy",c:"United Arab Emirates",code:"ae",lat:23.4,lng:53.8,cont:"asia"},
{n:"Keshika",c:"United Kingdom",code:"gb",lat:55.3,lng:-3.4,cont:"europe"},
{n:"Lakshaya",c:"Russian Federation",code:"ru",lat:61.5,lng:105.3,cont:"europe"},
{n:"Aakshinee",c:"United States of America",code:"us",lat:37,lng:-95.7,cont:"america"},
{n:"Binita",c:"Venezuela",code:"ve",lat:6.4,lng:-66.5,cont:"america"}
];

// RENDER
function render(){
  container.innerHTML="";
  data.forEach(i=>{
    container.innerHTML+=`
    <div class="card">
      <b>${i.n}</b>
      <div class="country">${i.c}</div>
      <img class="flag" src="https://flagcdn.com/w40/${i.code}.png">

      <div class="mini-map-popup">
        <iframe src="https://www.google.com/maps?q=${i.c}&output=embed"></iframe>
      </div>
    </div>`;
  });
}
render();

// DARK
function toggleDark(){ document.body.classList.toggle("dark"); }

// SWITCH
function showCards(){
  container.style.display="grid";
  mapContainer.style.display="none";
}

let map, globeInstance;

function showMap(){
  container.style.display="none";
  mapContainer.style.display="block";

  document.getElementById("map").style.display="block";
  document.getElementById("globe").style.display="none";

  if(map) map.remove();

  map=L.map('map').setView([20,0],2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  data.forEach(i=>{
    const icon=L.divIcon({className:'pulse'});
    L.marker([i.lat,i.lng],{icon})
      .addTo(map)
      .bindPopup(`<b>${i.c}</b><br>${i.n}`);
  });
}

function showGlobe(){
  container.style.display="none";
  mapContainer.style.display="block";

  document.getElementById("map").style.display="none";
  document.getElementById("globe").style.display="block";

  document.getElementById("globe").innerHTML="";

  globeInstance = Globe()(document.getElementById('globe'))
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
    .pointsData(data)
    .pointLat(d=>d.lat)
    .pointLng(d=>d.lng);
}

</script>

</body>
</html>
