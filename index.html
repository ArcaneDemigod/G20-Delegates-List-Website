<!DOCTYPE html>
<html>
<head>
  <title>G20 Delegates List</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #cfd9df, #e2ebf0);
    }

    .header {
      background: linear-gradient(90deg, #007bff, #00c6ff);
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 15px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-radius: 15px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(15px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    .person { font-weight: bold; }

    .country {
      font-size: 12px;
      background: rgba(255,255,255,0.6);
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 5px;
    }

    img {
      width: 45px;
      border-radius: 5px;
    }

    /* 📍 Tooltip */
    .tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: black;
      color: white;
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 5px;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
      white-space: nowrap;
    }

    .card:hover .tooltip {
      opacity: 1;
      bottom: 110%;
    }

  </style>
</head>

<body>

<div class="header">Delegates of G20</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search...">

  <select id="sort">
    <option value="">Sort</option>
    <option value="az">Country A-Z</option>
    <option value="za">Country Z-A</option>
  </select>

  <select id="filter">
    <option value="all">All</option>
    <option value="asia">Asia</option>
    <option value="europe">Europe</option>
    <option value="america">America</option>
    <option value="africa">Africa</option>
    <option value="oceania">Oceania</option>
  </select>
</div>

<div class="container" id="container"></div>

<script>

const data = [
{n:"Aareyesh",c:"Afghanistan",code:"af",cont:"asia"},
{n:"Deekshith",c:"Argentina",code:"ar",cont:"america"},
{n:"Soumil",c:"Australia",code:"au",cont:"oceania"},
{n:"Vamshi",c:"Bangladesh",code:"bd",cont:"asia"},
{n:"Niharika",c:"Brazil",code:"br",cont:"america"},
{n:"Srivalli",c:"Canada",code:"ca",cont:"america"},
{n:"Narthana",c:"China",code:"cn",cont:"asia"},
{n:"Chetan",c:"DR Congo",code:"cd",cont:"africa"},
{n:"Pathan",c:"Denmark",code:"dk",cont:"europe"},
{n:"Adwaith",c:"European Union",code:"eu",cont:"europe"},
{n:"Daniel",c:"France",code:"fr",cont:"europe"},
{n:"Aaskshar",c:"Germany",code:"de",cont:"europe"},
{n:"Ashwath",c:"India",code:"in",cont:"asia"},
{n:"Kshethrith",c:"Indonesia",code:"id",cont:"asia"},
{n:"Siri",c:"Iran",code:"ir",cont:"asia"},
{n:"Rithvik",c:"Israel",code:"il",cont:"asia"},
{n:"Varnith",c:"Italy",code:"it",cont:"europe"},
{n:"Rakshith",c:"Japan",code:"jp",cont:"asia"},
{n:"Dhruvi",c:"Mexico",code:"mx",cont:"america"},
{n:"Zenith",c:"New Zealand",code:"nz",cont:"oceania"},
{n:"Hamsa Nandini",c:"North Korea",code:"kp",cont:"asia"},
{n:"Aakshaya",c:"Palestine",code:"ps",cont:"asia"},
{n:"Vishwan",c:"Saudi Arabia",code:"sa",cont:"asia"},
{n:"Aashi",c:"South Korea",code:"kr",cont:"asia"},
{n:"Anshu",c:"South Africa",code:"za",cont:"africa"},
{n:"Daksh",c:"Syria",code:"sy",cont:"asia"},
{n:"Jai Chandra",c:"Turkey",code:"tr",cont:"europe"},
{n:"Krishna Reddy",c:"UAE",code:"ae",cont:"asia"},
{n:"Keshika",c:"UK",code:"gb",cont:"europe"},
{n:"Lakshaya",c:"Russia",code:"ru",cont:"europe"},
{n:"Aakshinee",c:"USA",code:"us",cont:"america"},
{n:"Binita",c:"Venezuela",code:"ve",cont:"america"}
];

const container = document.getElementById("container");

function render(list){
  container.innerHTML="";
  list.forEach(i=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div>
        <div class="person">${i.n}</div>
        <div class="country">${i.c}</div>
      </div>
      <img src="https://flagcdn.com/w40/${i.code}.png">
      <div class="tooltip">📍 ${i.c}</div>
    `;

    container.appendChild(div);
  });
}

render(data);

/* Search + Sort + Filter */
function update(){
  let list=[...data];

  const s=search.value.toLowerCase();
  const f=filter.value;
  const so=sort.value;

  if(s){
    list=list.filter(i=>i.n.toLowerCase().includes(s)||i.c.toLowerCase().includes(s));
  }

  if(f!=="all"){
    list=list.filter(i=>i.cont===f);
  }

  if(so==="az") list.sort((a,b)=>a.c.localeCompare(b.c));
  if(so==="za") list.sort((a,b)=>b.c.localeCompare(a.c));

  render(list);
}

search.oninput=update;
filter.onchange=update;
sort.onchange=update;

</script>

</body>
</html>
