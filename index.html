<!DOCTYPE html>
<html>
<head>
  <title>G20 Delegates List</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #cfd9df, #e2ebf0);
    }

    /* Header */
    .header {
      background: linear-gradient(90deg, #007bff, #00c6ff);
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 15px;
      flex-wrap: wrap;
    }

    select, input {
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    /* Grid */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    /* Glass Card */
    .card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-radius: 15px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.3);
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .person { font-weight: bold; }
    .country {
      font-size: 12px;
      background: rgba(255,255,255,0.6);
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 5px;
    }

    img {
      width: 45px;
      border-radius: 5px;
      transition: 0.4s;
    }

    img:hover {
      transform: scale(1.2);
    }

    /* Skeleton */
    .skeleton {
      height: 70px;
      border-radius: 15px;
      background: linear-gradient(90deg, #eee, #ddd, #eee);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200px 0; }
      100% { background-position: 200px 0; }
    }

  </style>
</head>

<body>

<div class="header">Delegates of G20</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search...">
  
  <select id="sort">
    <option value="">Sort</option>
    <option value="az">Country A-Z</option>
    <option value="za">Country Z-A</option>
  </select>

  <select id="filter">
    <option value="all">All Continents</option>
    <option value="asia">Asia</option>
    <option value="europe">Europe</option>
    <option value="america">America</option>
    <option value="africa">Africa</option>
  </select>
</div>

<div class="container" id="container"></div>

<script>
const data = [
  {name:"Ashwath", country:"India", code:"in", continent:"asia"},
  {name:"Daniel", country:"France", code:"fr", continent:"europe"},
  {name:"Soumil", country:"Australia", code:"au", continent:"america"},
  {name:"Aashi", country:"South Korea", code:"kr", continent:"asia"},
  {name:"Rithvik", country:"Israel", code:"il", continent:"asia"},
  {name:"Chetan", country:"DR Congo", code:"cd", continent:"africa"}
];

// Skeleton loading
const container = document.getElementById("container");
for(let i=0;i<6;i++){
  const div = document.createElement("div");
  div.className="skeleton";
  container.appendChild(div);
}

// Load data after delay
setTimeout(() => {
  render(data);
}, 1000);

function render(list){
  container.innerHTML="";
  list.forEach(item => {
    const div = document.createElement("div");
    div.className="card "+item.continent;

    div.innerHTML = `
      <div>
        <div class="person">${item.name}</div>
        <div class="country">${item.country}</div>
      </div>
      <img src="https://flagcdn.com/w40/${item.code}.png">
    `;

    // Map click
    div.onclick = () => {
      window.open(`https://www.google.com/maps/search/${item.country}`);
    };

    container.appendChild(div);
  });
}

// Search
document.getElementById("search").oninput = function(){
  filterSort();
};

// Sort + Filter
document.getElementById("sort").onchange = filterSort;
document.getElementById("filter").onchange = filterSort;

function filterSort(){
  let filtered = [...data];

  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;
  const sort = document.getElementById("sort").value;

  if(search){
    filtered = filtered.filter(i =>
      i.name.toLowerCase().includes(search) ||
      i.country.toLowerCase().includes(search)
    );
  }

  if(filter !== "all"){
    filtered = filtered.filter(i => i.continent === filter);
  }

  if(sort === "az"){
    filtered.sort((a,b)=>a.country.localeCompare(b.country));
  }
  if(sort === "za"){
    filtered.sort((a,b)=>b.country.localeCompare(a.country));
  }

  render(filtered);
}
</script>

</body>
</html>
