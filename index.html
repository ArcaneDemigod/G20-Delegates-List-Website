<!DOCTYPE html>
<html>
<head>
  <title>People & Flags</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #dfe9f3, #ffffff);
      transition: 0.3s;
    }

    /* 🌈 Header */
    .header {
      background: linear-gradient(90deg, #007bff, #00c6ff);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* 🌙 Dark Mode */
    .dark {
      background: #121212;
      color: white;
    }

    .dark .card {
      background: #1e1e1e;
    }

    .dark .country {
      background: #333;
    }

    .toggle {
      position: absolute;
      right: 20px;
      top: 20px;
      cursor: pointer;
      background: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* 🔍 Search */
    #search {
      margin: 20px auto;
      display: block;
      padding: 12px 15px;
      width: 90%;
      max-width: 400px;
      border-radius: 25px;
      border: none;
      outline: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    /* 📱 Grid */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    /* 🎴 Card */
    .card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-radius: 15px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border: 1px solid transparent;
      transition: 0.3s;
      animation: fadeIn 0.5s ease;
    }

    /* 🎯 Hover Glow + Border */
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(0,123,255,0.4);
      border: 1px solid #007bff;
    }

    /* 👤 Name */
    .person {
      font-weight: bold;
      font-size: 16px;
    }

    /* 🏷️ Country Badge */
    .country {
      font-size: 12px;
      background: #eee;
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 5px;
      display: inline-block;
    }

    /* 🏳️ Flag */
    img {
      width: 45px;
      height: 28px;
      border-radius: 5px;
      transition: 0.4s;
    }

    img:hover {
      transform: scale(1.3) rotate(5deg);
    }

    /* 🌍 Continent Colors */
    .asia { border-left: 5px solid orange; }
    .europe { border-left: 5px solid #3498db; }
    .america { border-left: 5px solid #2ecc71; }
    .africa { border-left: 5px solid #e67e22; }

    /* 🎬 Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

<div class="header">
  🌍 People & Countries
  <span class="toggle" onclick="toggleDark()">🌙</span>
</div>

<input type="text" id="search" placeholder="Search...">

<div class="container" id="container">

  <!-- Example Cards -->
  <div class="card asia">
    <div>
      <div class="person">Aareyesh</div>
      <div class="country">Afghanistan</div>
    </div>
    <img src="https://flagcdn.com/w40/af.png">
  </div>

  <div class="card america">
    <div>
      <div class="person">Deekshith</div>
      <div class="country">Argentina</div>
    </div>
    <img src="https://flagcdn.com/w40/ar.png">
  </div>

  <div class="card asia">
    <div>
      <div class="person">Ashwath</div>
      <div class="country">India</div>
    </div>
    <img src="https://flagcdn.com/w40/in.png">
  </div>

  <div class="card europe">
    <div>
      <div class="person">Daniel</div>
      <div class="country">France</div>
    </div>
    <img src="https://flagcdn.com/w40/fr.png">
  </div>

  <div class="card asia">
    <div>
      <div class="person">Aashi</div>
      <div class="country">South Korea</div>
    </div>
    <img src="https://flagcdn.com/w40/kr.png">
  </div>

  <!-- Add remaining cards similarly -->

</div>

<script>
  // 🔍 Search
  const search = document.getElementById("search");
  const cards = document.querySelectorAll(".card");

  search.addEventListener("input", function() {
    const value = this.value.toLowerCase();

    cards.forEach(card => {
      const text = card.innerText.toLowerCase();
      card.style.display = text.includes(value) ? "flex" : "none";
    });
  });

  // 🌙 Dark Mode
  function toggleDark() {
    document.body.classList.toggle("dark");
  }
</script>

</body>
</html>
