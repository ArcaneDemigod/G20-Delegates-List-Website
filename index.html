<!DOCTYPE html>
<html>
<head>
  <title>G20 Delegates List</title>

  <!-- ✅ Favicon -->
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/G20_logo.svg/512px-G20_logo.svg.png">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Globe -->
  <script src="https://unpkg.com/globe.gl"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg,#fff7e6,#e8f5e9);
      transition: 0.3s;
    }

    .dark {
      background:#121212;
      color:white;
    }

    /* HEADER */
    .header {
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      background:linear-gradient(90deg,#ff9933,#138808);
      color:white;
      padding:15px;
      font-size:22px;
      font-weight:bold;
      position:relative;
    }

    .logo {
      width:35px;
      animation:spin 8s linear infinite;
    }

    @keyframes spin {
      100% { transform:rotate(360deg); }
    }

    .dark-toggle {
      position:absolute;
      right:20px;
      top:15px;
      cursor:pointer;
      background:white;
      padding:5px 10px;
      border-radius:20px;
      color:black;
    }

    /* CONTROLS */
    .controls {
      text-align:center;
      padding:15px;
    }

    input, select {
      padding:10px;
      border-radius:20px;
      border:none;
      margin:5px;
    }

    button {
      padding:10px 20px;
      border:none;
      border-radius:20px;
      background:#ff9933;
      color:white;
      cursor:pointer;
      margin:5px;
    }

    /* CARDS */
    .container {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:15px;
      padding:20px;
    }

    .card {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px;
      border-radius:15px;
      background:rgba(255,255,255,0.5);
      backdrop-filter:blur(10px);
      transition:0.3s;
    }

    .dark .card {
      background:#1e1e1e;
    }

    .card:hover {
      transform:translateY(-5px);
      box-shadow:0 0 20px rgba(255,153,51,0.5);
    }

    .country {
      font-size:12px;
      background:#eee;
      padding:4px 10px;
      border-radius:20px;
      margin-top:5px;
    }

    img { width:45px; }

    /* MAP MODAL */
    #mapModal {
      display:none;
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      z-index:999;
    }

    #map,#globe { width:100%;height:100%; }

    .pulse {
      width:12px;height:12px;background:red;border-radius:50%;
      position:relative;
    }

    .pulse::after {
      content:'';position:absolute;width:100%;height:100%;
      border-radius:50%;background:red;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse {
      100% { transform:scale(3);opacity:0; }
    }

  </style>
</head>

<body>

<div class="header">
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/G20_logo.svg/512px-G20_logo.svg.png">
  Delegates of G20

  <div class="dark-toggle" onclick="toggleDark()">🌙</div>
</div>

<div class="controls">
  <input id="search" placeholder="Search...">

  <select id="filter">
    <option value="all">All</option>
    <option value="asia">Asia</option>
    <option value="europe">Europe</option>
    <option value="america">America</option>
    <option value="africa">Africa</option>
    <option value="oceania">Oceania</option>
  </select>

  <select id="sort">
    <option value="">Sort</option>
    <option value="az">Country A-Z</option>
    <option value="za">Country Z-A</option>
  </select>

  <br>
  <button onclick="openMap()">🌍 2D Map</button>
  <button onclick="openGlobe()">🌐 3D Globe</button>
</div>

<div class="container" id="container"></div>

<!-- MAP -->
<div id="mapModal">
  <button onclick="closeAll()" style="position:absolute;top:10px;right:20px;z-index:1000;">X</button>
  <div id="map"></div>
  <div id="globe" style="display:none;"></div>
</div>

<script>

const data = [
{n:"Aareyesh",c:"Afghanistan",code:"af",lat:33.9,lng:67.7,cont:"asia"},
{n:"Deekshith",c:"Argentina",code:"ar",lat:-38.4,lng:-63.6,cont:"america"},
{n:"Soumil",c:"Australia",code:"au",lat:-25.2,lng:133.7,cont:"oceania"},
{n:"Vamshi",c:"Bangladesh",code:"bd",lat:23.6,lng:90.3,cont:"asia"},
{n:"Niharika",c:"Brazil",code:"br",lat:-14.2,lng:-51.9,cont:"america"},
{n:"Srivalli",c:"Canada",code:"ca",lat:56.1,lng:-106.3,cont:"america"},
{n:"Narthana",c:"China",code:"cn",lat:35.8,lng:104.1,cont:"asia"},
{n:"Chetan",c:"Democratic Republic of the Congo",code:"cd",lat:-4,lng:21,cont:"africa"},
{n:"Pathan",c:"Denmark",code:"dk",lat:56.2,lng:9.5,cont:"europe"},
{n:"Daniel",c:"France",code:"fr",lat:46.2,lng:2.2,cont:"europe"},
{n:"Aaskshar",c:"Germany",code:"de",lat:51.1,lng:10.4,cont:"europe"},
{n:"Ashwath",c:"India",code:"in",lat:20.5,lng:78.9,cont:"asia"},
{n:"Rithvik",c:"Israel",code:"il",lat:31,lng:34.8,cont:"asia"},
{n:"Varnith",c:"Italy",code:"it",lat:41.8,lng:12.5,cont:"europe"},
{n:"Rakshith",c:"Japan",code:"jp",lat:36.2,lng:138.2,cont:"asia"},
{n:"Dhruvi",c:"Mexico",code:"mx",lat:23.6,lng:-102.5,cont:"america"},
{n:"Zenith",c:"New Zealand",code:"nz",lat:-40.9,lng:174.8,cont:"oceania"},
{n:"Aashi",c:"South Korea",code:"kr",lat:35.9,lng:127.7,cont:"asia"},
{n:"Anshu",c:"South Africa",code:"za",lat:-30.5,lng:22.9,cont:"africa"},
{n:"Jai Chandra",c:"Turkey",code:"tr",lat:38.9,lng:35.2,cont:"europe"},
{n:"Keshika",c:"United Kingdom",code:"gb",lat:55.3,lng:-3.4,cont:"europe"},
{n:"Aakshinee",c:"United States of America",code:"us",lat:37,lng:-95.7,cont:"america"}
];

// RENDER
const container=document.getElementById("container");

function render(list){
  container.innerHTML="";
  list.forEach(i=>{
    container.innerHTML+=`
    <div class="card">
      <div>
        <b>${i.n}</b>
        <div class="country">${i.c}</div>
      </div>
      <img src="https://flagcdn.com/w40/${i.code}.png">
    </div>`;
  });
}

render(data);

// SEARCH + FILTER + SORT
function update(){
  let list=[...data];

  const s=search.value.toLowerCase();
  const f=filter.value;
  const so=sort.value;

  if(s){
    list=list.filter(i=>i.n.toLowerCase().includes(s)||i.c.toLowerCase().includes(s));
  }

  if(f!=="all"){
    list=list.filter(i=>i.cont===f);
  }

  if(so==="az") list.sort((a,b)=>a.c.localeCompare(b.c));
  if(so==="za") list.sort((a,b)=>b.c.localeCompare(a.c));

  render(list);
}

search.oninput=update;
filter.onchange=update;
sort.onchange=update;

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
}

// MAP
let map;

function openMap(){
  document.getElementById("mapModal").style.display="block";
  document.getElementById("map").style.display="block";
  document.getElementById("globe").style.display="none";

  setTimeout(()=>{
    map=L.map('map').setView([20,0],2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    data.forEach(i=>{
      const icon=L.divIcon({className:'pulse'});
      L.marker([i.lat,i.lng],{icon})
      .addTo(map)
      .bindPopup(`<b>${i.c}</b><br>${i.n}`);
    });

  },100);
}

// GLOBE
function openGlobe(){
  document.getElementById("mapModal").style.display="block";
  document.getElementById("map").style.display="none";
  document.getElementById("globe").style.display="block";

  Globe()(document.getElementById('globe'))
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
    .pointsData(data)
    .pointLat(d=>d.lat)
    .pointLng(d=>d.lng)
    .pointLabel(d=>`${d.c} - ${d.n}`);
}

// CLOSE
function closeAll(){
  document.getElementById("mapModal").style.display="none";
  if(map) map.remove();
}

</script>

</body>
</html>
