<!DOCTYPE html>
<html>
<head>
  <title>G20 Delegates List</title>

  <!-- Favicon -->
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/G20_logo.svg/512px-G20_logo.svg.png">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Globe -->
  <script src="https://unpkg.com/globe.gl"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#fff7e6,#e8f5e9);
    }

    /* HEADER */
    .header {
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      background:linear-gradient(90deg,#ff9933,#138808);
      color:white;
      padding:15px;
      font-size:22px;
      font-weight:bold;
    }

    .logo {
      width:35px;
      animation:spin 8s linear infinite;
    }

    @keyframes spin {
      100% { transform:rotate(360deg); }
    }

    /* CONTROLS */
    .controls {
      text-align:center;
      padding:15px;
    }

    input {
      padding:10px;
      border-radius:20px;
      border:none;
      width:250px;
    }

    button {
      padding:10px 20px;
      border:none;
      border-radius:20px;
      background:#ff9933;
      color:white;
      cursor:pointer;
      margin:5px;
    }

    /* CARDS */
    .container {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:15px;
      padding:20px;
    }

    .card {
      position:relative;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px;
      border-radius:15px;
      background:rgba(255,255,255,0.4);
      backdrop-filter:blur(10px);
      transition:.3s;
    }

    .card:hover {
      transform:translateY(-5px);
      box-shadow:0 0 20px rgba(255,153,51,0.5);
    }

    .country {
      font-size:12px;
      background:#eee;
      padding:4px 10px;
      border-radius:20px;
      margin-top:5px;
    }

    img { width:45px; }

    /* MAP MODAL */
    #mapModal {
      display:none;
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      z-index:999;
    }

    #map,#globe { width:100%;height:100%; }

    /* MARKER */
    .pulse {
      width:12px;
      height:12px;
      background:red;
      border-radius:50%;
      position:relative;
    }

    .pulse::after {
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;
      background:red;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse {
      100% { transform:scale(3); opacity:0; }
    }

    /* BORDER ANIMATION */
    .leaflet-interactive {
      stroke-dasharray:5;
      animation:dash 4s linear infinite;
    }

    @keyframes dash {
      to { stroke-dashoffset:20; }
    }
  </style>
</head>

<body>

<div class="header">
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/G20_logo.svg/512px-G20_logo.svg.png">
  Delegates of G20
</div>

<div class="controls">
  <input id="search" placeholder="Search...">
  <br>
  <button onclick="openMap()">🌍 2D Map</button>
  <button onclick="openGlobe()">🌐 3D Globe</button>
</div>

<div class="container" id="container"></div>

<!-- MAP MODAL -->
<div id="mapModal">
  <button onclick="closeAll()" style="position:absolute;top:10px;right:20px;z-index:1000;">X</button>
  <div id="map"></div>
  <div id="globe" style="display:none;"></div>
</div>

<script>

const data = [
{n:"Aareyesh",c:"Afghanistan",code:"af",lat:33.9,lng:67.7},
{n:"Deekshith",c:"Argentina",code:"ar",lat:-38.4,lng:-63.6},
{n:"Soumil",c:"Australia",code:"au",lat:-25.2,lng:133.7},
{n:"Vamshi",c:"Bangladesh",code:"bd",lat:23.6,lng:90.3},
{n:"Niharika",c:"Brazil",code:"br",lat:-14.2,lng:-51.9},
{n:"Srivalli",c:"Canada",code:"ca",lat:56.1,lng:-106.3},
{n:"Narthana",c:"China",code:"cn",lat:35.8,lng:104.1},
{n:"Chetan",c:"Democratic Republic of the Congo",code:"cd",lat:-4,lng:21},
{n:"Pathan",c:"Denmark",code:"dk",lat:56.2,lng:9.5},
{n:"Adwaith",c:"European Union",code:"eu",lat:50.8,lng:4.3},
{n:"Daniel",c:"France",code:"fr",lat:46.2,lng:2.2},
{n:"Aaskshar",c:"Germany",code:"de",lat:51.1,lng:10.4},
{n:"Ashwath",c:"India",code:"in",lat:20.5,lng:78.9},
{n:"Kshethrith",c:"Indonesia",code:"id",lat:-0.7,lng:113.9},
{n:"Siri",c:"Iran",code:"ir",lat:32.4,lng:53.6},
{n:"Rithvik",c:"Israel",code:"il",lat:31,lng:34.8},
{n:"Varnith",c:"Italy",code:"it",lat:41.8,lng:12.5},
{n:"Rakshith",c:"Japan",code:"jp",lat:36.2,lng:138.2},
{n:"Dhruvi",c:"Mexico",code:"mx",lat:23.6,lng:-102.5},
{n:"Zenith",c:"New Zealand",code:"nz",lat:-40.9,lng:174.8},
{n:"Hamsa Nandini",c:"North Korea",code:"kp",lat:40.3,lng:127.5},
{n:"Aakshaya",c:"Palestine",code:"ps",lat:31.9,lng:35.2},
{n:"Vishwan",c:"Saudi Arabia",code:"sa",lat:23.8,lng:45},
{n:"Aashi",c:"South Korea",code:"kr",lat:35.9,lng:127.7},
{n:"Anshu",c:"South Africa",code:"za",lat:-30.5,lng:22.9},
{n:"Daksh",c:"Syria",code:"sy",lat:34.8,lng:38.9},
{n:"Jai Chandra",c:"Turkey",code:"tr",lat:38.9,lng:35.2},
{n:"Krishna Reddy",c:"United Arab Emirates",code:"ae",lat:23.4,lng:53.8},
{n:"Keshika",c:"United Kingdom",code:"gb",lat:55.3,lng:-3.4},
{n:"Lakshaya",c:"Russian Federation",code:"ru",lat:61.5,lng:105.3},
{n:"Aakshinee",c:"United States of America",code:"us",lat:37,lng:-95.7},
{n:"Binita",c:"Venezuela",code:"ve",lat:6.4,lng:-66.5}
];

// RENDER CARDS
const container=document.getElementById("container");

function render(list){
  container.innerHTML="";
  list.forEach(i=>{
    container.innerHTML+=`
    <div class="card">
      <div>
        <b>${i.n}</b>
        <div class="country">${i.c}</div>
      </div>
      <img src="https://flagcdn.com/w40/${i.code}.png">
    </div>`;
  });
}

render(data);

// SEARCH
search.oninput=()=>{
  const val=search.value.toLowerCase();
  render(data.filter(i=>i.n.toLowerCase().includes(val)||i.c.toLowerCase().includes(val)));
};

// MAP + GLOBE same as previous (kept working)
let map;

function openMap(){
  document.getElementById("mapModal").style.display="block";
  document.getElementById("map").style.display="block";
  document.getElementById("globe").style.display="none";

  setTimeout(()=>{
    map=L.map('map').setView([20,0],2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    data.forEach(i=>{
      const icon=L.divIcon({className:'pulse'});
      L.marker([i.lat,i.lng],{icon})
      .addTo(map)
      .bindPopup(`<b>${i.c}</b><br>${i.n}<br>
      <img src="https://flagcdn.com/w40/${i.code}.png">`);
    });

  },100);
}

function openGlobe(){
  document.getElementById("mapModal").style.display="block";
  document.getElementById("map").style.display="none";
  document.getElementById("globe").style.display="block";

  Globe()(document.getElementById('globe'))
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
    .pointsData(data)
    .pointLat(d=>d.lat)
    .pointLng(d=>d.lng)
    .pointLabel(d=>`${d.c} - ${d.n}`);
}

function closeAll(){
  document.getElementById("mapModal").style.display="none";
  if(map) map.remove();
}

</script>

</body>
</html>
