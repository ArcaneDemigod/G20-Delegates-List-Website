<!DOCTYPE html>
<html>
<head>
  <title>G20 Delegates List</title>

  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/G20_logo.svg/512px-G20_logo.svg.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/globe.gl"></script>

  <style>
    body { margin:0;font-family:Arial;background:#f5f5f5;transition:.3s;}
    .dark { background:#121212;color:white;}

    .header {
      display:flex;justify-content:center;align-items:center;
      gap:10px;background:linear-gradient(90deg,#ff9933,#138808);
      color:white;padding:15px;font-size:22px;position:relative;
    }

    .logo { width:35px;}
    .dark-toggle {
      position:absolute;right:20px;background:white;
      padding:5px 10px;border-radius:20px;cursor:pointer;color:black;
    }

    .controls { text-align:center;padding:15px;}

    input,select {
      padding:10px;border-radius:20px;border:none;margin:5px;
    }

    button {
      padding:10px 20px;border:none;border-radius:20px;
      background:#ff9933;color:white;cursor:pointer;margin:5px;
    }

    .container {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:15px;padding:20px;
    }

    .card {
      padding:15px;border-radius:12px;background:white;
      position:relative;transition:.3s;
    }

    .dark .card { background:#1e1e1e;}

    .card:hover {
      transform:translateY(-5px);
      box-shadow:0 0 20px rgba(255,153,51,0.5);
    }

    .country {
      font-size:12px;background:#eee;
      padding:4px 10px;border-radius:20px;margin-top:5px;
    }

    .flag { width:40px;margin-top:5px;}

    .mini-map-popup {
      position:absolute;
      bottom:110%;
      left:50%;
      transform:translateX(-50%);
      width:220px;height:150px;
      background:white;border-radius:10px;
      overflow:hidden;opacity:0;transition:.3s;
      pointer-events:none;
    }

    .card:hover .mini-map-popup { opacity:1;}

    .mini-map-popup iframe {
      width:100%;height:100%;border:none;
    }

    #mapContainer { display:none;height:520px;}
    #map,#globe { width:100%;height:100%;}

    .pulse {
      width:12px;height:12px;background:red;border-radius:50%;
      position:relative;
    }

    .pulse::after {
      content:'';position:absolute;width:100%;height:100%;
      border-radius:50%;background:red;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse {
      100% { transform:scale(3);opacity:0;}
    }

    .popup-card { text-align:center;}
    .popup-card img { width:60px;}

  </style>
</head>

<body>

<div class="header">
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/G20_logo.svg/512px-G20_logo.svg.png">
  Delegates of G20
  <div class="dark-toggle" onclick="toggleDark()">🌙</div>
</div>

<div class="controls">
  <input id="search" placeholder="Search...">
  <button onclick="showCards()">📋 List</button>
  <button onclick="showMap()">🌍 Map</button>
  <button onclick="showGlobe()">🌐 Globe</button>
</div>

<div class="container" id="container"></div>

<div id="mapContainer">
  <div id="map"></div>
  <div id="globe" style="display:none;"></div>
</div>

<script>
const data = [
{n:"Aareyesh",c:"Afghanistan",code:"af",lat:34.5553,lng:69.2075}, // Kabul
{n:"Harika",c:"Argentina",code:"ar",lat:-34.6037,lng:-58.3816}, // Buenos Aires
{n:"Soumil",c:"Australia",code:"au",lat:-35.2809,lng:149.1300}, // Canberra
{n:"Vamshi",c:"Bangladesh",code:"bd",lat:23.8103,lng:90.4125}, // Dhaka
{n:"Niharika",c:"Brazil",code:"br",lat:-15.8267,lng:-47.9218}, // Brasília
{n:"Srivalli",c:"Canada",code:"ca",lat:45.4215,lng:-75.6972}, // Ottawa
{n:"Narthana",c:"China",code:"cn",lat:39.9042,lng:116.4074}, // Beijing
{n:"Manaswini",c:"Colombia",code:"co",lat:4.7110,lng:-74.0721}, // Bogotá
{n:"Chetan",c:"Democratic Republic of the Congo",code:"cd",lat:-4.4419,lng:15.2663}, // Kinshasa
{n:"Adwaith",c:"European Union",code:"eu",lat:50.8503,lng:4.3517}, // Brussels
{n:"Danniel",c:"France",code:"fr",lat:48.8566,lng:2.3522}, // Paris
{n:"Aakshar",c:"Germany",code:"de",lat:52.5200,lng:13.4050}, // Berlin
{n:"Ashwath",c:"India",code:"in",lat:28.6139,lng:77.2090}, // New Delhi
{n:"Kshethrith",c:"Indonesia",code:"id",lat:-6.2088,lng:106.8456}, // Jakarta
{n:"Siri",c:"Iran",code:"ir",lat:35.6892,lng:51.3890}, // Tehran
{n:"Rithvik",c:"Israel",code:"il",lat:31.7683,lng:35.2137}, // Jerusalem
{n:"Varnith",c:"Italy",code:"it",lat:41.9028,lng:12.4964}, // Rome
{n:"Rakshith",c:"Japan",code:"jp",lat:35.6762,lng:139.6503}, // Tokyo
{n:"Dhruvi",c:"Mexico",code:"mx",lat:19.4326,lng:-99.1332}, // Mexico City
{n:"Zenith",c:"New Zealand",code:"nz",lat:-41.2866,lng:174.7756}, // Wellington
{n:"Hamsa Nandini",c:"North Korea",code:"kp",lat:39.0392,lng:125.7625}, // Pyongyang
{n:"Aakshaya",c:"Palestine",code:"ps",lat:31.7683,lng:35.2137}, // Jerusalem (common reference)
{n:"Vishwaan",c:"Saudi Arabia",code:"sa",lat:24.7136,lng:46.6753}, // Riyadh
{n:"Aashi",c:"South Korea",code:"kr",lat:37.5665,lng:126.9780}, // Seoul
{n:"Anshu",c:"South Africa",code:"za",lat:-25.7479,lng:28.2293}, // Pretoria
{n:"Daksh",c:"Syria",code:"sy",lat:33.5138,lng:36.2765}, // Damascus
{n:"Jai Chandra",c:"Turkey",code:"tr",lat:39.9334,lng:32.8597}, // Ankara
{n:"Krishna Reddy",c:"United Arab Emirates",code:"ae",lat:24.4539,lng:54.3773}, // Abu Dhabi
{n:"Keshika",c:"United Kingdom",code:"gb",lat:51.5074,lng:-0.1278}, // London
{n:"Lakshaya",c:"Russian Federation",code:"ru",lat:55.7558,lng:37.6173}, // Moscow
{n:"Aakshinee",c:"United States of America",code:"us",lat:38.9072,lng:-77.0369}, // Washington DC
{n:"Binita",c:"Venezuela",code:"ve",lat:10.4806,lng:-66.9036} // Caracas
];

// 🎯 RENDER CARDS
function render(){
  container.innerHTML="";
  data.forEach(i=>{
    container.innerHTML+=`
    <div class="card">
      <b>${i.n}</b>
      <div class="country">${i.c}</div>
      <img class="flag" src="https://flagcdn.com/w40/${i.code}.png">

      <div class="mini-map-popup">
        <iframe src="https://www.google.com/maps?q=${i.c}&output=embed"></iframe>
      </div>
    </div>`;
  });
}
render();

// DARK MODE
function toggleDark(){ document.body.classList.toggle("dark"); }

// VIEW SWITCH
function showCards(){
  container.style.display="grid";
  mapContainer.style.display="none";
}

let map, globeInstance;

// 🌍 MAP
function showMap(){
  container.style.display="none";
  mapContainer.style.display="block";

  document.getElementById("map").style.display="block";
  document.getElementById("globe").style.display="none";

  if(map) map.remove();

  map=L.map('map').setView([20,0],2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  data.forEach(i=>{
    const icon=L.divIcon({className:'pulse'});
    L.marker([i.lat,i.lng],{icon})
      .addTo(map)
      .bindPopup(`<b>${i.c}</b><br>${i.n}`);
  });
}

// 🌐 GLOBE
function showGlobe(){
  container.style.display="none";
  mapContainer.style.display="block";

  document.getElementById("map").style.display="none";
  document.getElementById("globe").style.display="block";

  document.getElementById("globe").innerHTML="";

  globeInstance = Globe()(document.getElementById('globe'))
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
    .pointsData(data)
    .pointLat(d=>d.lat)
    .pointLng(d=>d.lng);
}

</script>

</body>
</html>
